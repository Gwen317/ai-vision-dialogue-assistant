<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="450" rx="10" fill="#0b0f19"/>
  <!-- Gradients -->
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>
    <radialGradient id="neonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0b0f19" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Neon Aura in Center -->
  <circle cx="400" cy="225" r="200" fill="url(#neonGlow)"/>

  <!-- Tech Lines & Grid in Background -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.6">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400"/>
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450"/>
  </g>

  <!-- Abstract Force Graph Nodes (Cyberpunk Theme) -->
  <g opacity="0.3">
    <!-- Links -->
    <line x1="150" y1="120" x2="250" y2="180" stroke="#00f2fe" stroke-width="1.5"/>
    <line x1="250" y1="180" x2="200" y2="300" stroke="#00f2fe" stroke-width="1.5"/>
    <line x1="200" y1="300" x2="350" y2="280" stroke="#00f2fe" stroke-width="1.5"/>
    <line x1="650" y1="150" x2="550" y2="220" stroke="#ff0844" stroke-width="1.5"/>
    <line x1="550" y1="220" x2="600" y2="330" stroke="#ff0844" stroke-width="1.5"/>
    <!-- Nodes -->
    <circle cx="150" cy="120" r="8" fill="#00f2fe" filter="drop-shadow(0 0 8px #00f2fe)"/>
    <circle cx="250" cy="180" r="12" fill="#3b82f6" filter="drop-shadow(0 0 8px #3b82f6)"/>
    <circle cx="200" cy="300" r="10" fill="#10b981" filter="drop-shadow(0 0 8px #10b981)"/>
    <circle cx="350" cy="280" r="14" fill="#6366f1" filter="drop-shadow(0 0 8px #6366f1)"/>
    <circle cx="650" cy="150" r="9" fill="#ff0844" filter="drop-shadow(0 0 8px #ff0844)"/>
    <circle cx="550" cy="220" r="15" fill="#f59e0b" filter="drop-shadow(0 0 8px #f59e0b)"/>
    <circle cx="600" cy="330" r="11" fill="#ec4899" filter="drop-shadow(0 0 8px #ec4899)"/>
  </g>

  <!-- Title & Subtitle Text -->
  <text x="400" y="80" text-anchor="middle" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" letter-spacing="2">
    🏆 AI 视觉对话助手
  </text>
  <text x="400" y="115" text-anchor="middle" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="14" fill="#94a3b8" letter-spacing="1">
    AI Vision Dialogue Assistant — Demo Presentation
  </text>

  <!-- Play Button Container -->
  <g transform="translate(400, 240)">
    <!-- Outer Glow Rings -->
    <circle cx="0" cy="0" r="65" fill="none" stroke="#00f2fe" stroke-width="1" opacity="0.3" stroke-dasharray="10 5"/>
    <circle cx="0" cy="0" r="55" fill="none" stroke="#00f2fe" stroke-width="2" opacity="0.6" filter="drop-shadow(0 0 8px #00f2fe)"/>
    <!-- Button Body -->
    <circle cx="0" cy="0" r="45" fill="#0f172a" stroke="#00f2fe" stroke-width="3"/>
    <!-- Play Triangle -->
    <polygon points="-10,-18 -10,18 22,0" fill="#00f2fe" filter="drop-shadow(0 0 5px #00f2fe)"/>
  </g>

  <!-- Bottom Tip -->
  <rect x="250" y="360" width="300" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="400" y="382" text-anchor="middle" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#38bdf8">
    ▶ 点击此处 在线播放演示视频 (4:00)
  </text>
  
  <!-- Corner Tech Borders -->
  <path d="M 20,40 L 20,20 L 40,20" fill="none" stroke="#00f2fe" stroke-width="3"/>
  <path d="M 780,40 L 780,20 L 760,20" fill="none" stroke="#00f2fe" stroke-width="3"/>
  <path d="M 20,410 L 20,430 L 40,430" fill="none" stroke="#00f2fe" stroke-width="3"/>
  <path d="M 780,410 L 780,430 L 760,430" fill="none" stroke="#00f2fe" stroke-width="3"/>
</svg>
